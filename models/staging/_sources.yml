version: 2

sources:
  - name: nyc_taxi
    schema: nyc_taxi
    tables:
      - name: raw_trips
        description: "Contains raw NYC taxi trip records, including timestamps, distances, fare amounts, and location IDs. The grain of this table is one row per individual taxi trip."
      - name: raw_zones
        description: "A lookup table that maps each unique location ID to its corresponding borough, zone name, and service zone."
