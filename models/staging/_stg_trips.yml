version: 2

models:
  - name: stg_trips
    description: "One row per individual taxi trip is the grain of this model."
    columns:
      - name: pickup_datetime
        description: "It count the date and time when the trip started."
        tests:
          - not_null
      - name: pickup_location_id
        description: "Its the location id of the pickup where the trip started."
        tests:
          - not_null
      - name: fare_amount
        description: "It is the amount of money paid for the trip in USD. "
      - name: tip_amount
        description: "It is the amount of money paid as a tip for the trip in USD."
      - name: trip_distance
        description: "It is the distance of the trip in miles."
      - name: tip_pct
        description: "It is percentage of the tip amount over the fare amount."
