version: 2

models:
  - name: stg_zones
    description: one row per taxi zone from the
    columns:
      - name: location_id
        description: TLC location ID of the pickup location. This is used to join to the trips table in the mart
        tests:
          - not_null
          - unique
       
      - name: borough
        description: The borough of NYC that the taxi zone is in
        tests:
          - not_null
          
      